<!DOCTYPE html>
<html>
<head>
    <title>Student Performance Predictor</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

    <div class="container">

        <h1>Enter Student Details</h1>

        <form action="/predict" method="POST">

            <label>G1:</label>
            <input type="number" name="G1" required>

            <label>G2:</label>
            <input type="number" name="G2" required>

            <label>Study Time:</label>
            <input type="number" name="studytime" required>

            <label>Failures:</label>
            <input type="number" name="failures" required>

            <label>Absences:</label>
            <input type="number" name="absences" required>

            <button type="submit">Predict</button>

        </form>

        {% if prediction %}
            <h2>Predicted Grade: {{ prediction }}</h2>
        {% endif %}

    </div>

</body>
</html>
